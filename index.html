<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<script>
/* ============ CONFIG ============ */
const INSTRUMENTS = [
  {
    key: '1306',
    name: 'TOPIX連動型ETF',
    ticker: '1306',
    yahooSymbol: '1306.T',
    currency: '円',
    note: 'TOPIX ETF（東証）'
  }
];

const RULE = {
  smaTrendFast: 25,
  smaTrendSlow: 75,
  atrPeriod: 14,
  rsiPeriod: 14,
  hardStopATR: 2.0,
  pyramidStepATR: 1.0,
  partialTakeATR: 2.5,
  trailATR: 3.0,
  rsiOverbought: 75,
  rsiPullbackTrigger: 40,
  rsiTriggerMax: 65,
  rsiDeepPullback: 35,
  rsiLookbackDays: 10,
  maxLots: 3,
  sharesPerLot: 100  // ★ 1ロット=100株
};

/* ============ INDICATOR MATH ============ */
function sma(vals, period, i){
  if(i < period-1) return null;
  let s=0; for(let k=i-period+1;k<=i;k++) s+=vals[k];
  return s/period;
}

function emaArray(vals, period){
  const k = 2/(period+1);
  const out = new Array(vals.length).fill(null);
  let prev=null;
  for(let i=0;i<vals.length;i++){
    if(i===period-1){
      let s=0; for(let j=0;j<period;j++) s+=vals[j];
      prev = s/period; out[i]=prev;
    } else if(i>=period){
      prev = vals[i]*k + prev*(1-k); out[i]=prev;
    }
  }
  return out;
}

function computeIndicators(candles){
  const n = candles.length;
  const closes = candles.map(c=>c.close);
  const highs = candles.map(c=>c.high);
  const lows = candles.map(c=>c.low);

  const sma25 = new Array(n).fill(null);
  const sma75 = new Array(n).fill(null);
  for(let i=0;i<n;i++){
    sma25[i]=sma(closes,RULE.smaTrendFast,i);
    sma75[i]=sma(closes,RULE.smaTrendSlow,i);
  }

  const tr = new Array(n).fill(null);
  for(let i=0;i<n;i++){
    if(i===0){ tr[i]=highs[i]-lows[i]; continue; }
    tr[i]=Math.max(highs[i]-lows[i], Math.abs(highs[i]-closes[i-1]), Math.abs(lows[i]-closes[i-1]));
  }
  
  const atr = new Array(n).fill(null);
  for(let i=0;i<n;i++){
    if(i===RULE.atrPeriod-1){
      let s=0; for(let j=0;j<=i;j++) s+=tr[j];
      atr[i]=s/RULE.atrPeriod;
    } else if(i>=RULE.atrPeriod){
      atr[i]=(atr[i-1]*(RULE.atrPeriod-1)+tr[i])/RULE.atrPeriod;
    }
  }

  const rsi = new Array(n).fill(null);
  let avgGain=null, avgLoss=null;
  for(let i=1;i<n;i++){
    const change = closes[i]-closes[i-1];
    const gain = Math.max(change,0);
    const loss = Math.max(-change,0);
    if(i===RULE.rsiPeriod){
      let sg=0, sl=0;
      for(let j=1;j<=RULE.rsiPeriod;j++){
        const ch=closes[j]-closes[j-1];
        sg+=Math.max(ch,0); sl+=Math.max(-ch,0);
      }
      avgGain=sg/RULE.rsiPeriod; avgLoss=sl/RULE.rsiPeriod;
      rsi[i]= avgLoss===0?100:100-(100/(1+avgGain/avgLoss));
    } else if(i>RULE.rsiPeriod){
      avgGain=(avgGain*(RULE.rsiPeriod-1)+gain)/RULE.rsiPeriod;
      avgLoss=(avgLoss*(RULE.rsiPeriod-1)+loss)/RULE.rsiPeriod;
      rsi[i]= avgLoss===0?100:100-(100/(1+avgGain/avgLoss));
    }
  }

  const ema12 = emaArray(closes,12);
  const ema26 = emaArray(closes,26);
  const macdLine = closes.map((_,i)=> (ema12[i]!==null && ema26[i]!==null)? ema12[i]-ema26[i] : null);
  const macdValid = macdLine.filter(v=>v!==null);
  const signalOnValid = emaArray(macdValid,9);
  const signalLine = new Array(n).fill(null);
  let vi=0;
  for(let i=0;i<n;i++){
    if(macdLine[i]!==null){ signalLine[i]=signalOnValid[vi]; vi++; }
  }
  const hist = closes.map((_,i)=> (macdLine[i]!==null && signalLine[i]!==null)? macdLine[i]-signalLine[i] : null);

  return {sma25, sma75, atr, rsi, macdHist:hist};
}

/* ============ BACKTEST ENGINE ============ */
function runBacktestEngine(candles, indicators){
  const n = candles.length;
  const trades = [];
  const dailyPnL = [];
  let state = {lots:[], highestHigh:null, lastAddPrice:null, hardStop:null, totalRealizedPnL:0};
  
  for(let idx = RULE.rsiPeriod + RULE.atrPeriod; idx < n; idx++){
    const i = idx, p = idx - 1;
    const close = candles[i].close, high = candles[i].high, low = candles[i].low, date = candles[i].date;
    const sma25=indicators.sma25[i], sma75=indicators.sma75[i];
    const atr = indicators.atr[i];
    const rsi = indicators.rsi[i], rsiPrev = indicators.rsi[p];
    const macdHist = indicators.macdHist[i], macdHistPrev = indicators.macdHist[p];

    if(sma25===null||sma75===null||atr===null||rsi===null||macdHist===null) continue;

    const uptrend = close>sma75 && sma25>sma75;
    
    // 新規エントリー判定
    if(state.lots.length===0){
      let recentDip=false;
      for(let k=Math.max(0,i-RULE.rsiLookbackDays); k<i; k++){
        if(indicators.rsi[k]!==null && indicators.rsi[k]<RULE.rsiDeepPullback){ recentDip=true; break; }
      }
      const trigger = uptrend && recentDip && rsi>=RULE.rsiPullbackTrigger && rsi<=RULE.rsiTriggerMax && close>sma25;
      if(trigger){
        const entryPrice=close;
        const hardStop = entryPrice - RULE.hardStopATR*atr;
        state.lots.push({entryPrice, entryDate:date, atrAtEntry:atr, shares: RULE.sharesPerLot});
        state.highestHigh = high;
        state.lastAddPrice = entryPrice;
        state.hardStop = hardStop;
        trades.push({date, type:'BUY', price:entryPrice, shares:RULE.sharesPerLot, lots:state.lots.length});
      }
    } else {
      // 保有中の判定
      state.highestHigh = Math.max(state.highestHigh, high);
      const trailStop = state.highestHigh - RULE.trailATR*atr;
      const bearishCross = macdHistPrev!==null && macdHistPrev>=0 && macdHist<0;

      // 損切り
      if(close<=state.hardStop){
        const totalShares = state.lots.reduce((s,l)=>s+l.shares,0);
        const totalCost = state.lots.reduce((c,l)=>c+l.entryPrice*l.shares,0);
        const avgCost = totalCost / totalShares;
        const pnl = (close - avgCost) * totalShares;
        state.totalRealizedPnL += pnl;
        trades.push({date, type:'SELL', price:close, shares:totalShares, pnl:pnl, reason:'損切り'});
        state.lots=[]; state.highestHigh=null; state.lastAddPrice=null; state.hardStop=null;
      }
      // トレンド終了
      else if(close<trailStop || (close<sma25 && bearishCross)){
        const totalShares = state.lots.reduce((s,l)=>s+l.shares,0);
        const totalCost = state.lots.reduce((c,l)=>c+l.entryPrice*l.shares,0);
        const avgCost = totalCost / totalShares;
        const pnl = (close - avgCost) * totalShares;
        state.totalRealizedPnL += pnl;
        const reason = close<trailStop ? 'トレーリングストップ' : '25日線割れ+MACD弱転';
        trades.push({date, type:'SELL', price:close, shares:totalShares, pnl:pnl, reason:reason});
        state.lots=[]; state.highestHigh=null; state.lastAddPrice=null; state.hardStop=null;
      }
      // ピラミッディング
      else if(state.lots.length<RULE.maxLots && uptrend && (close-state.lastAddPrice)>=RULE.pyramidStepATR*atr && close>sma25){
        state.lots.push({entryPrice:close, entryDate:date, atrAtEntry:atr, shares:RULE.sharesPerLot});
        state.lastAddPrice=close;
        trades.push({date, type:'BUY', price:close, shares:RULE.sharesPerLot, lots:state.lots.length});
      }
      // 部分利確
      else if(state.lots.length>=2){
        const oldest = state.lots[0];
        const gain = close - oldest.entryPrice;
        const freshOverbought = rsi>=RULE.rsiOverbought && !(rsiPrev!==null && rsiPrev>=RULE.rsiOverbought);
        if(gain>=RULE.partialTakeATR*oldest.atrAtEntry || freshOverbought){
          const pnl = (close - oldest.entryPrice) * oldest.shares;
          state.totalRealizedPnL += pnl;
          state.lots.shift();
          const reason = freshOverbought ? 'RSI過熱' : '含み益到達';
          trades.push({date, type:'SELL', price:close, shares:oldest.shares, pnl:pnl, reason:reason});
        }
      }
    }

    // 日次損益記録
    const unrealizedPnL = state.lots.length > 0 
      ? state.lots.reduce((p,l)=>p+(close-l.entryPrice)*l.shares, 0)
      : 0;
    dailyPnL.push({date, totalPnL: state.totalRealizedPnL + unrealizedPnL});
  }

  return {trades, dailyPnL, state};
}

/* ============ BACKTEST STATS ============ */
function calculateStats(trades, dailyPnL){
  const buyTrades = trades.filter(t=>t.type==='BUY');
  const sellTrades = trades.filter(t=>t.type==='SELL');
  
  const completedRounds = [];
  let currentBuyPrice = null;
  let currentBuyDate = null;
  
  for(const trade of trades){
    if(trade.type==='BUY'){
      currentBuyPrice = trade.price;
      currentBuyDate = trade.date;
    } else if(trade.type==='SELL' && currentBuyPrice){
      const pnl = (trade.price - currentBuyPrice) * trade.shares;
      completedRounds.push({buyDate: currentBuyDate, sellDate: trade.date, price: currentBuyPrice, sellPrice: trade.price, pnl: pnl, shares: trade.shares});
      currentBuyPrice = null;
    }
  }

  const winTrades = completedRounds.filter(t=>t.pnl>0);
  const loseTrades = completedRounds.filter(t=>t.pnl<=0);
  
  const totalPnL = dailyPnL.length > 0 ? dailyPnL[dailyPnL.length-1].totalPnL : 0;
  const winRate = completedRounds.length > 0 ? (winTrades.length / completedRounds.length * 100).toFixed(1) : 0;
  
  const maxDrawdown = calculateMaxDrawdown(dailyPnL);
  const sharpeRatio = calculateSharpeRatio(dailyPnL);
  
  const monthlyStats = calculateMonthlyStats(dailyPnL);

  return {
    totalTrades: completedRounds.length,
    winTrades: winTrades.length,
    loseTrades: loseTrades.length,
    winRate: winRate,
    totalPnL: totalPnL,
    avgWin: winTrades.length > 0 ? winTrades.reduce((s,t)=>s+t.pnl, 0) / winTrades.length : 0,
    avgLoss: loseTrades.length > 0 ? loseTrades.reduce((s,t)=>s+t.pnl, 0) / loseTrades.length : 0,
    maxDrawdown: maxDrawdown,
    sharpeRatio: sharpeRatio,
    monthlyStats: monthlyStats,
    completedRounds: completedRounds
  };
}

function calculateMaxDrawdown(dailyPnL){
  if(dailyPnL.length === 0) return 0;
  let maxPnL = dailyPnL[0].totalPnL;
  let maxDD = 0;
  
  for(const entry of dailyPnL){
    if(entry.totalPnL > maxPnL){
      maxPnL = entry.totalPnL;
    } else {
      const dd = maxPnL - entry.totalPnL;
      maxDD = Math.max(maxDD, dd);
    }
  }
  return maxDD;
}

function calculateSharpeRatio(dailyPnL){
  if(dailyPnL.length < 2) return 0;
  const returns = [];
  for(let i=1; i<dailyPnL.length; i++){
    returns.push(dailyPnL[i].totalPnL - dailyPnL[i-1].totalPnL);
  }
  const avgReturn = returns.reduce((a,b)=>a+b, 0) / returns.length;
  const variance = returns.reduce((v,r)=>(v + Math.pow(r-avgReturn, 2)), 0) / returns.length;
  const stdDev = Math.sqrt(variance);
  return stdDev > 0 ? (avgReturn / stdDev * Math.sqrt(252)).toFixed(2) : 0;
}

function calculateMonthlyStats(dailyPnL){
  const monthly = {};
  for(const entry of dailyPnL){
    const month = entry.date.slice(0,7);
    if(!monthly[month]){
      monthly[month] = {start:0, end:0, count:0};
    }
    if(monthly[month].count === 0){
      monthly[month].start = entry.totalPnL;
    }
    monthly[month].end = entry.totalPnL;
    monthly[month].count++;
  }
  return monthly;
}

/* ============ BACKTEST UI ============ */
async function runBacktest(){
  document.getElementById('backtestResults').innerHTML = '<div style="text-align:center;color:var(--muted);padding:40px;">データ取得中...</div>';
  
  try{
    const inst = INSTRUMENTS[0];
    const candles = await fetchYahoo(inst.yahooSymbol);
    
    // フィルター：2026年1月以降
    const filteredCandles = candles.filter(c => c.date >= '2026-01-01' && c.date <= '2026-07-03');
    
    if(filteredCandles.length < 100){
      throw new Error(`データが不足しています（${filteredCandles.length}日分）`);
    }

    const indicators = computeIndicators(filteredCandles);
    const result = runBacktestEngine(filteredCandles, indicators);
    const stats = calculateStats(result.trades, result.dailyPnL);

    displayBacktestResults(stats, result);
  }catch(e){
    document.getElementById('backtestResults').innerHTML = `<div style="color:var(--sell);padding:20px;">エラー: ${e.message}</div>`;
  }
}

function displayBacktestResults(stats, result){
  const html = `
    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-label">総利益</div>
        <div class="stat-value ${stats.totalPnL >= 0 ? 'positive' : 'negative'}">
          ¥${stats.totalPnL.toLocaleString('ja-JP', {maximumFractionDigits:0})}
        </div>
      </div>
      <div class="stat-box">
        <div class="stat-label">完結トレード数</div>
        <div class="stat-value">${stats.totalTrades}回</div>
      </div>
      <div class="stat-box">

/* ============ DATA FETCH ============ */
function parseYahooChart(json){
  const result = json && json.chart && json.chart.result && json.chart.result[0];
  if(!result) throw new Error('Yahoo Financeのレスポンス形式が想定外です');
  const ts = result.timestamp;
  const q = result.indicators.quote[0];
  if(!ts || !q) throw new Error('価格データが含まれていません');
  const rows=[];
  for(let i=0;i<ts.length;i++){
    const c=q.close[i], o=q.open[i], h=q.high[i], l=q.low[i], v=q.volume[i];
    if(c===null || c===undefined) continue;
    const date = new Date(ts[i]*1000).toISOString().slice(0,10);
    rows.push({date, open:o??c, high:h??c, low:l??c, close:c, volume:v??0});
  }
  return rows;
}

const CORS_PROXIES = [
  (u)=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  (u)=>`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
  (u)=>`https://corsproxy.io/?url=${encodeURIComponent(u)}`
];

async function fetchYahoo(symbol){
  const target = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(symbol)}?range=2y&interval=1d`;
  let lastErr = null;
  for(const wrap of CORS_PROXIES){
    try{
      const res = await fetch(wrap(target));
      if(!res.ok) throw new Error('HTTPエラー: '+res.status);
      const text = await res.text();
      let json = JSON.parse(text);
      const rows = parseYahooChart(json);
      if(rows.length<80) throw new Error('データ件数が不足しています');
      return rows;
    }catch(e){ lastErr = e; continue; }
  }
  throw new Error('全てのデータ経路で取得に失敗しました');
}
